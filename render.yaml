services:
  - type: web
    name: ruralcare-backend
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT app.main:app"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GROQ_API_KEY
        scope: secret
      - key: GROQ_MODEL
        value: "llama3-8b-8192"
      - key: GROQ_VISION_MODEL
        value: "llama-3.2-11b-vision-preview"
      - key: OLLAMA_BASE_URL
        value: "http://localhost:11434"
      - key: OLLAMA_MODEL
        value: "llama3"
      - key: ENVIRONMENT
        value: "production"
      - key: FRONTEND_URL
        scope: secret
